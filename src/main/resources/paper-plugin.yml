name: Dcontracts
version: ${version}
main: me.devamy.contracts.Contracts
api-version: '1.21'
folia-supported: true
authors: [ DevAmy ]
description: A fully-featured contract plugin with admin tools, multi-database support, and GeyserMC/Bedrock compatibility.

permissions:
  contracts.use:
    default: true
    description: Allows access to the /contracts command

  contracts.create:
    default: true
    description: Allows creating new contracts

  contracts.admin:
    default: op
    description: Access to /contracts admin command and admin GUI

  contracts.admin.blacklist:
    default: op
    description: Access to manage the item blacklist

  contracts.admin.custom-items:
    default: op
    description: Access to manage custom items

  contracts.admin.edit-contracts:
    default: op
    description: Access to editing anyone's contracts

  contracts.admin.delete-contracts:
    default: op
    description: Access to deleting anyone's contracts

  contracts.admin.reload:
    default: op
    description: Reload the plugin configuration

  contracts.admin.convert:
    default: op
    description: Run the database converter tool

  contracts.admin.edit-contracts:
    default: op
    description: Edit contracts from the main GUI by right-clicking

  contracts.bypass.tax:
    default: op
    description: Bypass the configured tax on contract deliveries

  contracts.bypass.max-collect:
    default: op
    description: Bypass the max-collect limit

  contracts.bypass.max-collect-per-minute:
    default: op
    description: Bypass the max-collect-per-minute rate limit

dependencies:
  server:
    packetevents:
      load: BEFORE
      required: true
      join-classpath: true
    Vault:
      load: BEFORE
      required: true
      join-classpath: true
    Geyser-Spigot:
      load: BEFORE
      required: false
      join-classpath: false
    floodgate:
      load: BEFORE
      required: false
      join-classpath: false